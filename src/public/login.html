<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Secure Access</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #161624;
  --border: #1e1e32;
  --border-glow: #3d3a7a;
  --text: #e8e8f0;
  --text-muted: #6060a0;
  --accent: #7c6af7;
  --accent-dim: #4a3fcc;
  --accent-glow: rgba(124, 106, 247, 0.2);
  --danger: #ff6b6b;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Animated grid background */
.grid-bg {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: grid-drift 20s linear infinite;
}

@keyframes grid-drift {
  0% { transform: translateY(0); }
  100% { transform: translateY(60px); }
}

/* Radial glow in center */
.glow-center {
  position: fixed;
  width: 600px;
  height: 600px;
  background: radial-gradient(ellipse, rgba(124,106,247,0.08) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.login-container {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 420px;
  padding: 1rem;
  animation: appear 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes appear {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo-area {
  text-align: center;
  margin-bottom: 2.5rem;
}

.vault-icon {
  width: 64px;
  height: 64px;
  background: var(--surface2);
  border: 1px solid var(--border-glow);
  border-radius: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  margin-bottom: 1.25rem;
  box-shadow: 0 0 30px rgba(124,106,247,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  animation: pulse-border 3s ease-in-out infinite;
}

@keyframes pulse-border {
  0%, 100% { border-color: var(--border-glow); box-shadow: 0 0 20px rgba(124,106,247,0.1); }
  50% { border-color: var(--accent); box-shadow: 0 0 40px rgba(124,106,247,0.25); }
}

.logo-text {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text);
}

.logo-text em {
  font-style: normal;
  color: var(--accent);
}

.tagline {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 0.4rem;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2.25rem;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
  opacity: 0.5;
}

.card-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 1.75rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.card-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.field {
  margin-bottom: 1.25rem;
}

label {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.875rem 1rem;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

input::placeholder { color: var(--text-muted); }

.btn-login {
  width: 100%;
  padding: 0.925rem;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: white;
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.btn-login::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
}

.btn-login:hover { background: #6a58e5; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,106,247,0.4); }
.btn-login:active { transform: translateY(0); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.btn-login .spinner {
  display: none;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin: 0 auto;
}

.btn-login.loading .spinner { display: block; }
.btn-login.loading .btn-text { display: none; }

@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  display: none;
  background: rgba(255, 107, 107, 0.1);
  border: 1px solid rgba(255, 107, 107, 0.3);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  color: var(--danger);
  margin-top: 1rem;
  text-align: center;
}

.error-msg.show { display: block; animation: shake 0.3s ease; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.footer-note {
  text-align: center;
  margin-top: 1.5rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}

@media (max-width: 480px) {
  .login-container { padding: .75rem; }
  .logo-text { font-size: 1.65rem; }
  .card { padding: 1.5rem 1.25rem; border-radius: 16px; }
  .vault-icon { width: 52px; height: 52px; font-size: 1.4rem; }
  .logo-area { margin-bottom: 2rem; }
  input { font-size: 16px; } /* prevent iOS auto-zoom */
}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow-center"></div>

<div class="login-container">
  <div class="logo-area">
    <div class="vault-icon">🔐</div>
    <div class="logo-text">V<em>ault</em></div>
    <div class="tagline">Secure File Storage</div>
  </div>

  <div class="card">
    <div class="card-title">Authentication Required</div>

    <form id="loginForm">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" placeholder="Enter username" autofocus required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <div class="spinner"></div>
        <span class="btn-text">Access Vault</span>
      </button>
      <div class="error-msg" id="errorMsg">Invalid credentials — access denied.</div>
    </form>
  </div>

  <div class="footer-note">All files are stored securely &middot; End-to-end encrypted links</div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  err.classList.remove('show');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/dashboard';
    } else {
      err.textContent = data.error || 'Invalid credentials — access denied.';
      err.classList.add('show');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  } catch {
    err.textContent = 'Connection error. Please try again.';
    err.classList.add('show');
    btn.classList.remove('loading');
    btn.disabled = false;
  }
});
</script>
</body>
</html>
